<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#f4f6f9;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#0f172a;
color:white;
height:100vh;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
background:#1e293b;
color:white;
cursor:pointer;
border-radius:6px;
font-size:15px;
}

.sidebar button:hover{
background:#334155;
}

/* MAIN CONTENT */

.main{
flex:1;
padding:25px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
font-size:18px;
}

</style>

</head>

<body>

<script>

if(localStorage.getItem("loggedIn")!="true"){
window.location.href="login.html";
}

</script>


<div class="sidebar">

<h2>SB School ERP</h2>

<button onclick="openStudents()">Students</button>

<button onclick="exportExcel()">Export Excel</button>

<button onclick="backupData()">Backup Data</button>

<button onclick="restoreData()">Restore Data</button>

<button onclick="changePassword()">Change Password</button>

<button onclick="logout()">Logout</button>

</div>


<div class="main">

<div class="header">

<h2>Dashboard</h2>

<div>Admin Panel</div>

</div>


<div class="cards">

<div class="card" id="studentCount">
Students: 0
</div>

<div class="card" id="feesCollected">
Fees Collected: ₹0
</div>

<div class="card" id="feesPending">
Fees Pending: ₹0
</div>

</div>


</div>


<script>

function getStudents(){

return JSON.parse(localStorage.getItem("students") || "[]");

}


function updateDashboard(){

let students=getStudents();

let collected=0;
let pending=0;

students.forEach(s=>{

collected+=s.paid;

pending+=(s.totalFee-s.paid);

});


document.getElementById("studentCount").innerText="Students: "+students.length;

document.getElementById("feesCollected").innerText="Fees Collected: ₹"+collected;

document.getElementById("feesPending").innerText="Fees Pending: ₹"+pending;

}


updateDashboard();



function openStudents(){

window.location.href="students.html";

}


function exportExcel(){

let students=getStudents();

let csv="Name,Class,Section,Paid,Pending\n";

students.forEach(s=>{

csv+=`${s.name},${s.className},${s.section},${s.paid},${s.totalFee-s.paid}\n`;

});

let blob=new Blob([csv]);

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="students_report.csv";

link.click();

}


function backupData(){

let data=localStorage.getItem("students");

let blob=new Blob([data]);

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="backup.json";

link.click();

}


function restoreData(){

let fileInput=document.createElement("input");

fileInput.type="file";

fileInput.onchange=function(event){

let reader=new FileReader();

reader.onload=function(){

localStorage.setItem("students",reader.result);

location.reload();

};

reader.readAsText(event.target.files[0]);

};

fileInput.click();

}


function changePassword(){

let newPass=prompt("Enter new password");

localStorage.setItem("adminPassword",newPass);

alert("Password changed successfully");

}


function logout(){

localStorage.removeItem("loggedIn");

window.location.href="login.html";

}

</script>

</body>
</html>

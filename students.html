<!DOCTYPE html>
<html>
<head>
<title>Students</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.header{
background:#0f172a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
padding:25px;
}

.formBox{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

input,select{
padding:10px;
margin:5px;
font-size:15px;
}

button{
padding:8px 12px;
background:#0f172a;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin:2px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

</style>

</head>

<body>

<script>
if(localStorage.getItem("loggedIn")!="true"){
window.location.href="login.html";
}
</script>

<div class="header">

<h2>Student Management</h2>

<button onclick="goBack()">Dashboard</button>

</div>

<div class="container">

<div class="formBox">

<h3>Add Student</h3>

<input id="name" placeholder="Student Name">

<select id="className">
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="section">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<input id="totalFee" placeholder="Total Fee">

<button onclick="addStudent()">Add Student</button>

</div>


<div class="formBox">

<input id="searchBox" placeholder="Search student" onkeyup="searchStudent()">

</div>


<table>

<thead>

<tr>
<th>Name</th>
<th>Class</th>
<th>Paid</th>
<th>Pending</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="studentTable"></tbody>

</table>

</div>


<script>

/* SAFE DATA LOAD */

function getStudents(){

let data = JSON.parse(localStorage.getItem("students")||"[]");

/* fix old student records automatically */

data.forEach(s=>{
if(!s.history) s.history=[];
if(!s.paid) s.paid=0;
});

return data;

}

function saveStudents(data){
localStorage.setItem("students",JSON.stringify(data));
}


/* ADD STUDENT */

function addStudent(){

let name=document.getElementById("name").value;

let className=document.getElementById("className").value;

let section=document.getElementById("section").value;

let totalFee=Number(document.getElementById("totalFee").value);

if(!name || !totalFee){
alert("Enter correct details");
return;
}

let students=getStudents();

students.push({
name,
className,
section,
totalFee,
paid:0,
history:[]
});

saveStudents(students);

showStudents();

}


/* SHOW STUDENTS */

function showStudents(){

let students=getStudents();

let table=document.getElementById("studentTable");

table.innerHTML="";

students.forEach((s,index)=>{

table.innerHTML+=`

<tr>

<td>${s.name}</td>

<td>${s.className}-${s.section}</td>

<td>₹${s.paid}</td>

<td>₹${s.totalFee-s.paid}</td>

<td>

<button onclick="payFee(${index})">Pay</button>

<button onclick="viewHistory(${index})">History</button>

<button onclick="editStudent(${index})">Edit</button>

<button onclick="printReceipt(${index})">Receipt</button>

<button onclick="deleteStudent(${index})">Delete</button>

</td>

</tr>

`;

});

}


/* PAY FEE */

function payFee(index){

let students=getStudents();

let amount=prompt("Enter payment amount");

if(!amount) return;

amount = Number(amount);

students[index].paid += amount;

students[index].history.push({

date:new Date().toLocaleDateString(),

amount:amount

});

saveStudents(students);

showStudents();

}


/* VIEW HISTORY */

function viewHistory(index){

let students=getStudents();

let history=students[index].history;

if(history.length==0){

alert("No payments yet");

return;

}

let text="Payment History\n\n";

history.forEach(h=>{

text+=`${h.date} : ₹${h.amount}\n`;

});

alert(text);

}


/* EDIT STUDENT */

function editStudent(index){

let students=getStudents();

let s=students[index];

let newName=prompt("Edit name",s.name);

let newFee=prompt("Edit total fee",s.totalFee);

if(newName) s.name=newName;

if(newFee) s.totalFee=Number(newFee);

saveStudents(students);

showStudents();

}


/* DELETE STUDENT */

function deleteStudent(index){

if(confirm("Delete student?")){

let students=getStudents();

students.splice(index,1);

saveStudents(students);

showStudents();

}

}


/* RECEIPT */

function printReceipt(index){

let students=getStudents();

let s=students[index];

let today=new Date().toLocaleDateString();

let receiptNo="SB-"+Date.now();

let win=window.open();

win.document.write(`

<h2>SWATHANTHRA BHARATHI SCHOOL</h2>

<hr>

Receipt No: ${receiptNo}<br>

Date: ${today}<br><br>

Name: ${s.name}<br>

Class: ${s.className}-${s.section}<br>

Total Fee: ₹${s.totalFee}<br>

Paid: ₹${s.paid}<br>

Pending: ₹${s.totalFee-s.paid}<br>

<br><br>

Parent Signature ____________

<br><br>

Principal Signature ____________

`);

win.print();

}


/* SEARCH */

function searchStudent(){

let value=document.getElementById("searchBox").value.toLowerCase();

let rows=document.querySelectorAll("#studentTable tr");

rows.forEach(row=>{

row.style.display=row.innerText.toLowerCase().includes(value)?"":"none";

});

}


/* BACK */

function goBack(){

window.location.href="index.html";

}


showStudents();

</script>

</body>
</html>

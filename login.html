<!DOCTYPE html>
<html>
<head>
<title>School ERP Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0px 5px 20px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#16a34a;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#15803d;
}

</style>
</head>

<body>

<div class="box">

<h2>Swathanthra Bharathi School ERP</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

if(!localStorage.getItem("adminPassword")){
localStorage.setItem("adminPassword","1234");
}

function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

let savedPassword=localStorage.getItem("adminPassword");

if(u==="admin" && p===savedPassword){

localStorage.setItem("loggedIn","true");

window.location.href="index.html";

}else{

alert("Invalid login");

}

}

</script>

</body>
</html>

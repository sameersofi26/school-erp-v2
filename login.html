<!DOCTYPE html>
<html>
<head>

<title>School ERP Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0px 5px 20px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#16a34a;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#15803d;
}

.footer{
margin-top:15px;
font-size:12px;
color:#666;
}

</style>

</head>

<body>

<div class="box">

<h2>Swathanthra Bharathi School ERP</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="footer">
Default login: admin / 1234
</div>

</div>

<script>

/* REGISTER SERVICE WORKER SAFELY */

if ("serviceWorker" in navigator) {

window.addEventListener("load", function() {

navigator.serviceWorker.register("service-worker.js");

});

}


/* CREATE DEFAULT PASSWORD IF FIRST TIME */

if (!localStorage.getItem("adminPassword")) {

localStorage.setItem("adminPassword","1234");

}


/* LOGIN FUNCTION */

function login(){

let username=document.getElementById("username").value;

let password=document.getElementById("password").value;

let savedPassword=localStorage.getItem("adminPassword");

if(username==="admin" && password===savedPassword){

localStorage.setItem("loggedIn","true");

window.location.href="index.html";

}else{

alert("Invalid username or password");

}

}

</script>

</body>
</html>
